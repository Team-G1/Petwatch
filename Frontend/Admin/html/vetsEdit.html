<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>PetWatch Admin - Edit Veterinarian</title>
    
    <link rel="stylesheet" href="../../Admin/css/sidebar.css" />
    <link rel="stylesheet" href="../../Admin/css/vetsEdit.css" /> 
    
    <script src="../../Admin/javascript/sidebar.js" defer></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="admin-dashboard">
        <main>
            <div class="topbar">
                <div class="page-title">
                    <h1>Edit Veterinarian</h1>
                    <p class="subtitle">Update professional profile information</p>
                </div>
            </div>

            <div class="dashboard-content">
                <div class="breadcrumb">
                    <a href="vets.html" class="breadcrumb-link">
                        <i class="fas fa-arrow-left"></i> Back to Veterinarians List
                    </a>
                </div>

                <div class="card edit-form-card">
                    <div class="edit-form">
                        <div class="form-section">
                            <h4 class="section-title">Personal Information</h4>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="vet-name">Full Name</label>
                                    <input type="text" id="vet-name" class="form-input" placeholder="e.g. Dr. Helen Perera">
                                </div>
                                <div class="form-group">
                                    <label for="vet-designation">Professional Designation</label>
                                    <input type="text" id="vet-designation" class="form-input" placeholder="e.g. Veterinary Surgeon">
                                </div>
                            </div>
                        </div>

                        <div class="form-section">
                            <h4 class="section-title">Contact & Location</h4>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="vet-location">Branch / Location</label>
                                    <input type="text" id="vet-location" class="form-input" placeholder="e.g. Colombo">
                                </div>
                                <div class="form-group">
                                    <label for="vet-phone">Phone Number</label>
                                    <input type="text" id="vet-phone" class="form-input" placeholder="011-XXXXXXX">
                                </div>
                            </div>
                        </div>

                        <div class="form-actions">
                            <button type="button" class="btn-danger" id="delete-btn">
                                <i class="fas fa-trash"></i> Delete Profile
                            </button>
                            <div class="save-buttons">
                                <button type="button" class="btn-cancel" onclick="window.location.href='vets.html'">Cancel</button>
                                <button type="button" class="btn-save" id="save-btn">
                                    <i class="fas fa-save"></i> Update Profile
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // 1. CATCH THE ID FROM THE URL
            const params = new URLSearchParams(window.location.search);
            const vetId = params.get('id');

            if (!vetId) {
                alert('Error: No Veterinarian ID provided.');
                window.location.href = 'vets.html';
                return;
            }

            // 2. FETCH CURRENT DATA TO PRE-FILL FORM
            try {
                const response = await fetch(`http://localhost:5001/api/vets/${vetId}`);
                if (!response.ok) throw new Error('Vet not found');
                
                const vet = await response.json();

                // Map database fields to input IDs
                document.getElementById('vet-name').value = vet.name || '';
                document.getElementById('vet-designation').value = vet.designation || '';
                document.getElementById('vet-location').value = vet.location || '';
                document.getElementById('vet-phone').value = vet.phone || '';
            } catch (err) {
                console.error('Fetch error:', err);
                alert('Failed to load professional data.');
            }

            // 3. HANDLE SAVE (UPDATE) BUTTON
            document.getElementById('save-btn').addEventListener('click', async function() {
                const updatedData = {
                    name: document.getElementById('vet-name').value,
                    designation: document.getElementById('vet-designation').value,
                    location: document.getElementById('vet-location').value,
                    phone: document.getElementById('vet-phone').value
                };

                this.disabled = true;
                this.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Updating...';

                try {
                    const res = await fetch(`http://localhost:5001/api/vets/${vetId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(updatedData)
                    });

                    if (res.ok) {
                        alert('Profile updated successfully!');
                        window.location.href = 'vets.html';
                    } else {
                        const error = await res.json();
                        alert('Update failed: ' + (error.message || 'Server error'));
                        this.disabled = false;
                        this.innerHTML = '<i class="fas fa-save"></i> Update Profile';
                    }
                } catch (err) {
                    console.error('Update Error:', err);
                    alert('Connection to server failed.');
                    this.disabled = false;
                }
            });

            // 4. HANDLE DELETE BUTTON
            document.getElementById('delete-btn').addEventListener('click', async () => {
                if (!confirm('Are you sure you want to permanently delete this professional profile?')) return;

                try {
                    const res = await fetch(`http://localhost:5001/api/vets/${vetId}`, {
                        method: 'DELETE'
                    });

                    if (res.ok) {
                        alert('Veterinarian removed successfully.');
                        window.location.href = 'vets.html';
                    } else {
                        alert('Failed to delete the profile.');
                    }
                } catch (err) {
                    console.error('Delete error:', err);
                }
            });
        });
    </script>
</body>
</html>
