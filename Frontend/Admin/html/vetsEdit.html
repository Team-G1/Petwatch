<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>PetWatch Admin - Edit Veterinarian</title>
    
    <link rel="stylesheet" href="../../Admin/css/sidebar.css" />
    <link rel="stylesheet" href="../../Admin/css/vetsEdit.css" /> 
    
    <script src="../../Admin/javascript/vets.js"></script>
    <script src="../../Admin/javascript/sidebar.js" defer></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="admin-dashboard">
        <main>
            <div class="topbar">
                <div class="page-title">
                    <h1>Edit Veterinarian</h1>
                    <p class="subtitle">Update professional profile information</p>
                </div>
            </div>

            <div class="dashboard-content">
                <div class="breadcrumb">
                    <a href="vets.html" class="breadcrumb-link">
                        <i class="fas fa-arrow-left"></i> Back to Veterinarians List
                    </a>
                </div>

                <div class="card edit-form-card">
                    <div class="edit-form">
                        <div class="form-section">
                            <h4 class="section-title">Personal Information</h4>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="vet-name">Full Name</label>
                                    <input type="text" id="vet-name" class="form-input" placeholder="e.g. Dr. Helen Perera">
                                </div>
                                <div class="form-group">
                                    <label for="vet-designation">Professional Designation</label>
                                    <input type="text" id="vet-designation" class="form-input" placeholder="e.g. Veterinary Surgeon">
                                </div>
                            </div>
                        </div>

                        <div class="form-section">
                            <h4 class="section-title">Contact & Location</h4>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="vet-location">Branch / Location</label>
                                    <input type="text" id="vet-location" class="form-input" placeholder="e.g. Colombo">
                                </div>
                                <div class="form-group">
                                    <label for="vet-phone">Phone Number</label>
                                    <input type="text" id="vet-phone" class="form-input" placeholder="011-XXXXXXX">
                                </div>
                            </div>
                        </div>

                        <div class="form-actions">
                            <button type="button" class="btn-danger" id="delete-btn">
                                <i class="fas fa-trash"></i> Delete Profile
                            </button>
                            <div class="save-buttons">
                                <button type="button" class="btn-cancel" onclick="window.location.href='vets.html'">Cancel</button>
                                <button type="button" class="btn-save" id="save-btn">
                                    <i class="fas fa-save"></i> Update Profile
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        
    </script>
</body>
</html>
