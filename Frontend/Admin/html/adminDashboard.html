<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetWatch Admin | Dashboard</title>
    <link rel="stylesheet" href="../../Admin/css/sidebar.css" />
    <link rel="stylesheet" href="../../Admin/css/adminDashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="../../Admin/javascript/sidebar.js" defer></script>
</head>
<body>
    <div class="admin-dashboard">
        <main>
            <div class="topbar">
                <div class="page-title">
                    <h1>Admin Dashboard</h1>
                    <p class="subtitle">Operational Overview</p>
                </div>
                
                <div class="user-profile">
                    
                    <img src="https://randomuser.me/api/portraits/women/44.jpg" alt="Profile Picture">
                    <div class="user-info">
                        <span class="username">Admin</span>
                        <span class="user-role">Administrator</span>
                    </div>
                </div>
            </div>

            <div class="quick-stats">
    <div class="stat-card appointments">
        <div class="stat-icon"><i class="fas fa-calendar-check"></i></div>
        <div class="stat-info">
            <h3 id="stat-total-bookings">0</h3>
            <p>Total Appointments</p>
        </div>
    </div>

    <div class="stat-card vets">
        <div class="stat-icon"><i class="fas fa-user-md"></i></div>
        <div class="stat-info">
            <h3 id="stat-total-vets">0</h3>
            <p>Total Vets</p>
        </div>
    </div>

    <div class="stat-card locations">
        <div class="stat-icon"><i class="fas fa-map-marker-alt"></i></div>
        <div class="stat-info">
            <h3 id="stat-total-locations">0</h3>
            <p>Total Locations</p>
        </div>
    </div>

    <div class="stat-card tips">
        <div class="stat-icon"><i class="fas fa-lightbulb"></i></div>
        <div class="stat-info">
            <h3 id="stat-total-tips">0</h3>
            <p>Total Health Tips</p>
        </div>
    </div>
</div>
                    
                    <div class="card appointments-card">
                        <div class="card-header">
                            <h3><i class="fas fa-calendar-alt"></i> Recent Appointments</h3>
                            <a href="adminAppointments.html" class="view-all">View All</a>
                        </div>
                        <table class="appointments-table" id="appointments-table">
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>ID</th>
                                    <th>Date/Time</th>
                                    <th>Status</th>
                                    
                                </tr>
                            </thead>
                            <tbody id="appointments-tbody"> <tr><td colspan="5" style="text-align:center;">Loading appointments...</td></tr> </tbody>
                        </table>
                    </div>
                

                <div class="card location-summary">
    <h3><i class="fas fa-map-marker-alt"></i> Appointments by Location</h3>
    <div class="location-grid" id="location-list"> </div>
</div>
            </div>
        </main>
    </div>

    <script>
document.addEventListener('DOMContentLoaded', () => {
    refreshDashboard();
});

async function refreshDashboard() {
    const branches = ['Colombo', 'Kandy', 'Kurunegala', 'Galle', 'Jaffna'];

    try {
        // 1. Fetch all data from your API
        const [statsRes, bookingsRes] = await Promise.all([
            fetch('http://localhost:5001/api/admin/stats'),
            fetch('http://localhost:5001/api/admin/bookings')
        ]);

        const stats = await statsRes.json();
        const bookings = await bookingsRes.json();

        // 2. RENDER TABLE (Recent 5)
        const tbody = document.getElementById('appointments-tbody');
        if (tbody) {
            const recent = bookings.slice(0, 5); // Only show the latest 5
            tbody.innerHTML = recent.length > 0 ? recent.map(book => `
                <tr>
                    <td><strong>${book.appointmentNumber || '#---'}</strong></td>
                    <td>
                        <div class="user-info">
                            <span>${book.userName}</span>
                            <small>${book.petName} (${book.petType})</small>
                        </div>
                    </td>
                    <td>${book.date || book.dateFrom}</td>
                    <td><span class="status-badge ${book.status.toLowerCase()}">${book.status}</span></td>
                   
                </tr>
            `).join('') : '<tr><td colspan="5" style="text-align:center;">No recent appointments found.</td></tr>';
        }

        // 3. RENDER ALL 5 LOCATIONS
        const locationDiv = document.getElementById('location-list');
        if (locationDiv) {
            locationDiv.innerHTML = branches.map(branch => {
                const branchData = stats.locations.find(l => l._id === branch);
                const count = branchData ? branchData.count : 0;
                const percent = stats.total > 0 ? (count / stats.total) * 100 : 0;

                return `
                    <div class="location-row" style="margin-bottom: 18px;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                            <span style="font-weight: 500;">${branch}</span>
                            <span style="color: #4e73df; font-weight: bold;">${count}</span>
                        </div>
                        <div style="background: #f1f1f1; height: 10px; border-radius: 5px;">
                            <div style="width: ${percent}%; background: #4e73df; height: 100%; border-radius: 5px; transition: width 0.5s;"></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

    } catch (err) {
        console.error("Dashboard Update Failed:", err);
    }
}

// Update Status function matching your server's PATCH route
async function updateStatus(id, newStatus) {
    if (!confirm(`Mark as ${newStatus}?`)) return;
    try {
        const res = await fetch(`http://localhost:5001/api/book/status/${id}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status: newStatus })
        });
        if (res.ok) refreshDashboard();
    } catch (err) { console.error(err); }
}
    </script>
</body>
</html>
