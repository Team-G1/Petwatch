<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PetWatch Admin - Edit Health Tip</title>

    <!-- Main stylesheet -->
    <link rel="stylesheet" href="../../Admin/css/sidebar.css" />
    <link rel="stylesheet" href="../../Admin/css/health-edit.css" />

    <!-- Sidebar manager -->
    <script src="../../Admin/javascript/sidebar.js" defer></script>

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Sidebar will be automatically inserted here -->

    <div class="admin-dashboard">
      <!-- Main Content -->
      <main>
        <!-- Top Bar -->
        <div class="topbar">
          <div class="page-title">
            <h1>Edit Health Tip</h1>
            <p class="subtitle">Update health tip information</p>
          </div>

          <div class="user-profile">
            <div class="notification-icon">
              <i class="fas fa-bell"></i>
              <span class="notification-badge">3</span>
            </div>
            <img
              src="https://randomuser.me/api/portraits/women/44.jpg"
              alt="Profile Picture"
            />
            <div class="user-info">
              <span class="username">Admin</span>
              <span class="user-role">Content Editor</span>
            </div>
          </div>
        </div>

        <!-- Edit Content -->
        <div class="dashboard-content">
          <!-- Breadcrumb -->
          <div class="breadcrumb">
            <a href="health-tips-view.html" class="breadcrumb-link">
              <i class="fas fa-arrow-left"></i> Back to Health Tips
            </a>
          </div>

          <!-- Edit Form Card -->
          <div class="card edit-form-card">
            <div class="card-header">
              <h3><i class="fas fa-edit"></i> Edit Health Tip</h3>
              <div class="status-indicator">
                <span class="status-badge published">Published</span>
              </div>
            </div>

            <div class="edit-form">
              <!-- Basic Information -->
              <div class="form-section">
                <h4 class="section-title">Basic Information</h4>

                <div class="form-row">
                  <div class="form-group">
                    <label for="tip-title">Title</label>
                    <input
                      type="text"
                      id="tip-title"
                      class="form-input"
                      placeholder="Enter tip title..."
                      value="Regular Vet Check-Ups"
                    />
                  </div>

                  <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" class="form-select">
                      <option value="cats" selected>Cats</option>
                      <option value="dogs">Dogs</option>
                      <option value="small-pets">Small Pets</option>
                      <option value="birds">Birds</option>
                      <option value="nutrition">Nutrition</option>
                      <option value="grooming">Grooming</option>
                    </select>
                  </div>
                </div>

                <div class="form-group">
                  <label for="tip-description">Description</label>
                  <textarea
                    id="tip-description"
                    class="form-textarea"
                    rows="6"
                    placeholder="Write detailed description here..."
                  >
Ensure your cat receives routine veterinary check-ups to catch any health issues early and keep their vaccinations up to date. Early detection is key to preventing serious conditions. Regular visits help monitor weight, dental health, and overall well-being.
                                </textarea
                  >
                </div>
              </div>

              <!-- Image Upload -->
              <div class="form-section">
                <h4 class="section-title">Featured Image</h4>

                <div class="image-upload-area">
                  <div class="image-preview" id="image-preview">
                    <img
                      src="https://images.unsplash.com/photo-1583512603802-3cc3af6351df?w=600&auto=format&fit=crop"
                      alt="Current featured image"
                      id="current-image"
                    />
                    <div class="image-overlay">
                      <button
                        type="button"
                        class="change-image-btn"
                        id="change-image-btn"
                      >
                        <i class="fas fa-camera"></i> Change
                      </button>
                    </div>
                  </div>

                  <div class="upload-info">
                    <input
                      type="file"
                      id="image-upload"
                      accept="image/*"
                      style="display: none"
                    />
                    <button type="button" class="btn-upload" id="upload-btn">
                      <i class="fas fa-cloud-upload-alt"></i> Upload New Image
                    </button>
                    <p class="upload-hint">Recommended: 600×400px JPG or PNG</p>
                  </div>
                </div>
              </div>

              <!-- Status Settings -->
              <div class="form-section">
                <h4 class="section-title">Status Settings</h4>

                <div class="form-row">
                  <div class="form-group">
                    <label for="status">Status</label>
                    <select id="status" class="form-select">
                      <option value="published" selected>Published</option>
                      <option value="draft">Draft</option>
                    </select>
                  </div>

                  <div class="form-group">
                    <label for="publish-date">Publish Date</label>
                    <input
                      type="date"
                      id="publish-date"
                      class="form-input"
                      value="2024-01-15"
                    />
                  </div>
                </div>
              </div>

              <!-- Action Buttons -->
              <div class="form-actions">
                <div class="action-buttons">
                  <button type="button" class="btn-secondary" id="preview-btn">
                    <i class="fas fa-eye"></i> Preview
                  </button>
                  <button type="button" class="btn-danger" id="delete-btn">
                    <i class="fas fa-trash"></i> Delete
                  </button>
                </div>

                <div class="save-buttons">
                  <button type="button" class="btn-cancel" id="cancel-btn">
                    Cancel
                  </button>
                  <button type="button" class="btn-save" id="save-btn">
                    <i class="fas fa-save"></i> Save Changes
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
    <script src="../javascript/health-tips-edit.js"></script>
  </body>
</html>
