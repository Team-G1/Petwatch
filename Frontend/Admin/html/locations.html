<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PetWatch Admin - Locations</title>

<link rel="stylesheet" href="../../Admin/css/sidebar.css">
<link rel="stylesheet" href="../../Admin/css/health-view.css">

<script src="../../Admin/javascript/sidebar.js" defer></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="admin-dashboard">

<main>

<!-- TOPBAR -->
<div class="topbar">

<div class="page-title">
<h1>Service Locations</h1>
<p class="subtitle">Manage PetWatch clinic locations</p>
</div>

<div class="user-profile">

<div class="notification-icon">
<i class="fas fa-bell"></i>
<span class="notification-badge">3</span>
</div>

<img src="https://randomuser.me/api/portraits/women/44.jpg">

<div class="user-info">
<span class="username">Admin</span>
<span class="user-role">Location Manager</span>
</div>

</div>

</div>


<!-- PAGE CONTENT -->
<div class="dashboard-content">

<!-- QUICK STATS -->
<div class="quick-stats">

<div class="stat-card">
<div class="stat-icon">
<i class="fas fa-map-marker-alt"></i>
</div>

<div class="stat-info">
<h3 id="totalLocations">0</h3>
<p>Total Locations</p>
</div>
</div>

<div class="stat-card">
<div class="stat-icon">
<i class="fas fa-city"></i>
</div>

<div class="stat-info">
<h3 id="totalCities">0</h3>
<p>Cities Covered</p>
</div>
</div>

</div>


<!-- HEADER ACTIONS -->
<div class="tips-header">

<div class="filters">
<div class="filter-group">
<label><i class="fas fa-search"></i> Search</label>
<input type="text" class="filter-select" id="searchLocation" placeholder="Search locations">
</div>
</div>

<div class="actions">

<a href="locations-add.html" class="btn-primary">
<i class="fas fa-plus"></i> Add Location
</a>

</div>

</div>


<!-- LOCATIONS GRID -->
<div class="card tips-grid-card">

<div class="card-header">

<h3><i class="fas fa-map"></i> Service Locations</h3>

<div class="table-actions">

<button class="btn-refresh" onclick="loadLocations()">
<i class="fas fa-sync-alt"></i> Refresh
</button>

</div>

</div>

<div class="tips-grid" id="locationsGrid">

</div>

</div>

</div>

</main>

</div>

<script src="../javascript/locations-view.js"></script>

</body>
</html>
