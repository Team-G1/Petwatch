<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>PetWatch Admin - Add Vets</title>

    <link rel="stylesheet" href="../../Admin/css/sidebar.css" />
    <link rel="stylesheet" href="../../Admin/css/vets-edit.css" />

    <script src="../../Admin/javascript/sidebar.js" defer></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="admin-dashboard">
        <main>
            <div class="topbar">
                <div class="page-title">
                    <h1>Add a Vet</h1>
                    <p class="subtitle">Create a new veterinarian profile</p>
                </div>

                <div class="user-profile">
                    <div class="notification-icon">
                        <i class="fas fa-bell"></i>
                        <span class="notification-badge">3</span>
                    </div>
                    <img src="https://randomuser.me/api/portraits/women/44.jpg" alt="Profile Picture">
                    <div class="user-info">
                        <span class="username">Admin</span>
                        <span class="user-role">Vet Manager</span>
                    </div>
                </div>
            </div>

            <div class="dashboard-content">
                <div class="breadcrumb">
                    <a href="vets.html" class="breadcrumb-link">
                        <i class="fas fa-arrow-left"></i> Back to Veterinarians List
                    </a>
                </div>

                <div class="card edit-form-card">
                    <div class="card-header">
                        <h3><i class="fas fa-user-md"></i> Vet Professional Profile</h3>
                        <div class="status-indicator">
                            <span class="status-badge draft">New Entry</span>
                        </div>
                    </div>

                    <div class="edit-form">
                        <div class="form-section">
                            <h4 class="section-title">Profile Picture</h4>
                            <div class="image-upload-area">
                                <div class="image-preview" id="image-preview">
                                    <img src="https://via.placeholder.com/150?text=Vet+Photo" alt="Preview" id="current-image" style="border-radius: 50%; width: 150px; height: 150px; object-fit: cover;">
                                </div>
                                <div class="upload-info">
                                    <input type="file" id="image-upload" accept="image/*" style="display:none;">
                                    <button type="button" class="btn-upload" id="upload-btn">
                                        <i class="fas fa-camera"></i> Upload Photo
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div class="form-section">
                            <h4 class="section-title">Basic Information</h4>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="vet-name">Full Name (with Title)</label>
                                    <input type="text" id="vet-name" class="form-input" placeholder="e.g. Dr. Helen Perera">
                                </div>
                                <div class="form-group">
                                    <label for="vet-designation">Designation</label>
                                    <input type="text" id="vet-designation" class="form-input" placeholder="e.g. Veterinary Surgeon">
                                </div>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label for="vet-location">Location / Branch</label>
                                    <input type="text" id="vet-location" class="form-input" placeholder="e.g. Colombo">
                                </div>
                                <div class="form-group">
                                    <label for="vet-experience">Years of Experience</label>
                                    <input type="number" id="vet-experience" class="form-input" placeholder="e.g. 10">
                                </div>
                            </div>
                        </div>

                        <div class="form-section">
                            <h4 class="section-title">Professional Details</h4>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="vet-phone">Phone Number</label>
                                    <input type="tel" id="vet-phone" class="form-input" placeholder="011-3456789">
                                </div>
                                <div class="form-group">
                                    <label for="vet-email">Email Address</label>
                                    <input type="email" id="vet-email" class="form-input" placeholder="doctor@example.com">
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="vet-tags">Specialization Tags (comma separated)</label>
                                <input type="text" id="vet-tags" class="form-input" placeholder="e.g. Surgery, Dentistry">
                            </div>
                        </div>

                        <div class="form-section">
                            <h4 class="section-title">Duty Status</h4>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="duty-status">Current Status</label>
                                    <select id="duty-status" class="form-select">
                                        <option value="on-duty">On Duty</option>
                                        <option value="off-duty">Off Duty</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label for="vet-role">Professional Role</label>
                                    <select id="vet-role" class="form-select">
                                        <option value="Specialist">Specialist</option>
                                        <option value="General Practitioner">General Practitioner</option>
                                        <option value="Senior Vet">Senior Vet</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="form-actions">
                            <button type="button" class="btn-cancel" id="cancel-btn">Cancel</button>
                            <button type="button" class="btn-save" id="save-btn">
                                <i class="fas fa-save"></i> Save Vet Profile
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const imageUpload = document.getElementById('image-upload');
            const uploadBtn = document.getElementById('upload-btn');
            const currentImage = document.getElementById('current-image');
            const saveBtn = document.getElementById('save-btn');

            // 1. Handle Image Upload Trigger and Preview
            uploadBtn.addEventListener('click', () => imageUpload.click());

            imageUpload.addEventListener('change', function (e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => currentImage.src = e.target.result;
                    reader.readAsDataURL(file);
                }
            });

            // 2. Handle Form Submission
            saveBtn.addEventListener('click', async function () {
                const vetData = {
                    name: document.getElementById('vet-name').value,
                    designation: document.getElementById('vet-designation').value,
                    location: document.getElementById('vet-location').value,
                    experience: document.getElementById('vet-experience').value,
                    phone: document.getElementById('vet-phone').value,
                    email: document.getElementById('vet-email').value,
                    tags: document.getElementById('vet-tags').value,
                    status: document.getElementById('duty-status').value,
                    role: document.getElementById('vet-role').value
                };

                // Basic validation for required fields
                if (!vetData.name || !vetData.email || !vetData.location) {
                    alert('Please complete the Name, Email, and Location fields.');
                    return;
                }

                // Use FormData to support image file upload
                const formData = new FormData();
                Object.keys(vetData).forEach(key => formData.append(key, vetData[key]));
                
                const imageFile = imageUpload.files[0];
                if (imageFile) formData.append('image', imageFile);

                this.disabled = true;
                this.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';

                try {
                    const response = await fetch('http://localhost:5001/api/vets', {
                        method: 'POST',
                        body: formData // Backend handles Multipart/Form-Data
                    });

                    if (response.ok) {
                        alert('New Veterinarian profile created successfully!');
                        window.location.href = 'vets.html';
                    } else {
                        const error = await response.json();
                        alert('Failed to save profile: ' + (error.message || 'Unknown error'));
                        this.disabled = false;
                        this.innerHTML = '<i class="fas fa-save"></i> Save Vet Profile';
                    }
                } catch (error) {
                    console.error('Submission error:', error);
                    alert('Server error: Could not reach the database.');
                    this.disabled = false;
                    this.innerHTML = '<i class="fas fa-save"></i> Save Vet Profile';
                }
            });

            // 3. Handle Cancel Button
            document.getElementById('cancel-btn').addEventListener('click', () => {
                if (confirm('Discard changes and return to the list?')) {
                    window.location.href = 'vets.html';
                }
            });
        });
    </script>
</body>
</html>
