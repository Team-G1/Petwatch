<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Services</title>
    
    <link rel="stylesheet" href="../../Frontend/css/services.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="../../Frontend/css/navbar.css">
   

</head>
<body>

    <div id="navbar"></div>

    <main class="main-content">
        <div class="card-container">
            <h1>Booking Services</h1>

            <div class="tabs-wrapper">
                <div class="tab" onclick="openTab('pet-care', this)">Pet Care</div>
                <div class="tab active" onclick="openTab('pet-clinic', this)">Pet Clinic</div>
                <div class="tab" onclick="openTab('pet-grooming', this)">Pet Grooming</div>
            </div>

            <div class="form-box">
                <form class="form-grid">
                    
                    <div id="pet-clinic" class="tab-content active">
                        <div class="row">
                            <div class="input-group">
                                <label>Select Your Pet *</label>
                                <div class="input-wrapper">
                                    <select class="pet-selector">
                                        <option value="" disabled selected>Loading your pets...</option>
                                    </select>
                                    <i class="fa-solid fa-caret-down icon-right"></i>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="input-group">
                                <label>Pet Type</label>
                                <div class="input-wrapper">
                                    <input type="text" class="pet-type-input" placeholder="Auto-filled" readonly style="background-color: #f5f5f5;">
                                </div>
                            </div>
                            <div class="input-group">
                                <label class="label-short">Breed</label>
                                <div class="input-wrapper">
                                    <input type="text" class="pet-breed-input" placeholder="Auto-filled" readonly style="background-color: #f5f5f5;">
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="input-group">
                                <label>Age</label>
                                <div class="input-wrapper">
                                    <input type="text" class="pet-age-input" placeholder="Auto-filled" readonly style="background-color: #f5f5f5;">
                                </div>
                            </div>
                            <div class="input-group">
                                <label class="label-short">Weight</label>
                                <div class="input-wrapper">
                                    <input type="text" class="pet-weight-input" placeholder="Auto-filled" readonly style="background-color: #f5f5f5;">
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="input-group">
                                <label>Location</label>
                                <div class="input-wrapper">
                                    <select>
                                        <option>Kandy</option>
                                        <option>Colombo</option>
                                        <option>Galle</option>
                                    </select>
                                    <i class="fa-solid fa-caret-down icon-right"></i>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="input-group">
                                <label>Date</label>
                                <div class="input-wrapper">
                                    <input type="text" placeholder="DD.MM.YYYY" onfocus="(this.type='date')" onblur="(this.type='text')">
                                    <i class="fa-regular fa-calendar icon-right"></i>
                                </div>
                            </div>
                            <div class="input-group">
                                <label class="label-short">Time</label>
                                <div class="input-wrapper">
                                    <input type="text" placeholder="HH.MM" onfocus="(this.type='time')" onblur="(this.type='text')">
                                    <i class="fa-regular fa-clock icon-right"></i>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div id="pet-care" class="tab-content">
                        <div class="row">
                            <div class="input-group">
                                <label>Select Your Pet *</label>
                                <div class="input-wrapper">
                                    <select class="pet-selector">
                                        <option value="" disabled selected>Loading your pets...</option>
                                    </select>
                                    <i class="fa-solid fa-caret-down icon-right"></i>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="input-group">
                                <label>Pet Type</label>
                                <div class="input-wrapper">
                                    <input type="text" class="pet-type-input" placeholder="Auto-filled" readonly style="background-color: #f5f5f5;">
                                </div>
                            </div>
                            <div class="input-group">
                                <label class="label-short">Breed</label>
                                <div class="input-wrapper">
                                    <input type="text" class="pet-breed-input" placeholder="Auto-filled" readonly style="background-color: #f5f5f5;">
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="input-group">
                                <label>Age</label>
                                <div class="input-wrapper">
                                    <input type="text" class="pet-age-input" placeholder="Auto-filled" readonly style="background-color: #f5f5f5;">
                                </div>
                            </div>
                            <div class="input-group">
                                <label class="label-short">Weight</label>
                                <div class="input-wrapper">
                                    <input type="text" class="pet-weight-input" placeholder="Auto-filled" readonly style="background-color: #f5f5f5;">
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="input-group">
                                <label>Location</label>
                                <div class="input-wrapper">
                                    <select>
                                        <option>Kandy</option>
                                        <option>Colombo</option>
                                        <option>Galle</option>
                                    </select>
                                    <i class="fa-solid fa-caret-down icon-right"></i>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="input-group">
                                <label>Date</label>
                                <div class="split-wrapper">
                                    <div class="mini-input">
                                        <span>From</span>
                                        <div class="input-wrapper">
                                            <input id="care-date-start" type="text" placeholder="Start" onfocus="(this.type='date')" onblur="(this.type='text')">
                                        </div>
                                    </div>
                                    <div class="mini-input">
                                        <span>To</span>
                                        <div class="input-wrapper">
                                            <input id="care-date-end" type="text" placeholder="End" onfocus="(this.type='date')" onblur="(this.type='text')">
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="input-group">
                                <label>Time</label>
                                <div class="split-wrapper">
                                    <div class="mini-input">
                                        <span>From</span>
                                        <div class="input-wrapper">
                                            <input id="care-time-start" type="text" placeholder="Start" onfocus="(this.type='time')" onblur="(this.type='text')">
                                        </div>
                                    </div>
                                    <div class="mini-input">
                                        <span>To</span>
                                        <div class="input-wrapper">
                                            <input id="care-time-end" type="text" placeholder="End" onfocus="(this.type='time')" onblur="(this.type='text')">
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div id="pet-grooming" class="tab-content">
                        <div class="row">
                            <div class="input-group">
                                <label>Select Your Pet *</label>
                                <div class="input-wrapper">
                                    <select class="pet-selector">
                                        <option value="" disabled selected>Loading your pets...</option>
                                    </select>
                                    <i class="fa-solid fa-caret-down icon-right"></i>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="input-group">
                                <label>Pet Type</label>
                                <div class="input-wrapper">
                                    <input type="text" class="pet-type-input" placeholder="Auto-filled" readonly style="background-color: #f5f5f5;">
                                </div>
                            </div>
                            <div class="input-group">
                                <label class="label-short">Breed</label>
                                <div class="input-wrapper">
                                    <input type="text" class="pet-breed-input" placeholder="Auto-filled" readonly style="background-color: #f5f5f5;">
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="input-group">
                                <label>Age</label>
                                <div class="input-wrapper">
                                    <input type="text" class="pet-age-input" placeholder="Auto-filled" readonly style="background-color: #f5f5f5;">
                                </div>
                            </div>
                            <div class="input-group">
                                <label class="label-short">Weight</label>
                                <div class="input-wrapper">
                                    <input type="text" class="pet-weight-input" placeholder="Auto-filled" readonly style="background-color: #f5f5f5;">
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="input-group">
                                <label>Location</label>
                                <div class="input-wrapper">
                                    <select id="grooming-location">
                                        <option>Kandy</option>
                                        <option>Colombo</option>
                                        <option>Galle</option>
                                    </select>
                                    <i class="fa-solid fa-caret-down icon-right"></i>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="input-group">
                                <label>Grooming Package</label>
                                <div class="input-wrapper">
                                    <select id="grooming-package">
                                        <option>Basic Bath & Brush</option>
                                        <option>Full Grooming</option>
                                        <option>Nail Trimming</option>
                                    </select>
                                    <i class="fa-solid fa-caret-down icon-right"></i>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="input-group">
                                <label>Date</label>
                                <div class="input-wrapper">
                                    <input type="text" placeholder="DD.MM.YYYY" onfocus="(this.type='date')" onblur="(this.type='text')">
                                    <i class="fa-regular fa-calendar icon-right"></i>
                                </div>
                            </div>
                            <div class="input-group">
                                <label class="label-short">Time</label>
                                <div class="input-wrapper">
                                    <input type="text" placeholder="HH.MM" onfocus="(this.type='time')" onblur="(this.type='text')">
                                    <i class="fa-regular fa-clock icon-right"></i>
                                </div>
                            </div>
                        </div>
                    </div>

                </form>
            </div>

            <div class="btn-container">
                <button class="btn-submit" type="button">Book Appointment</button>
            </div>
        </div> 
    </main>
  
    <footer>
        <div id="footer"></div>
    </footer>
  
    <script src="../../Frontend/javascript/navbar.js"></script>
    <script src="../../Frontend/javascript/footer.js"></script>
    <script src="../../Frontend/javascript/services.js"></script>

</body>
</html>
