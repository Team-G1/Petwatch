<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Locations - PetWatch</title>
    
    <link rel="stylesheet" href="../../Frontend/css/services.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>

    <style>
        /* Page Specific Styles */
        .map-container-box {
            background: white;
            width: 100%;
            max-width: 1000px; /* Wider than the booking form */
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.08);
            text-align: center;
        }

        /* The Map Element - HEIGHT IS CRITICAL */
        #sl-map {
            height: 500px; 
            width: 100%;
            border-radius: 12px;
            margin-top: 20px;
            border: 2px solid #eee;
            z-index: 1; /* Ensures it sits behind the navbar dropdowns */
        }

        .location-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 30px;
            justify-content: center;
        }

        .loc-card {
            background: #f9f9f9;
            border: 1px solid #eee;
            border-radius: 10px;
            padding: 15px;
            width: 180px;
            text-align: left;
            transition: 0.3s;
            cursor: pointer;
        }
        .loc-card:hover {
            border-color: #17AFEF;
            background: #f0f9ff;
            transform: translateY(-3px);
        }
        .loc-card h3 { font-size: 1rem; color: #333; margin-bottom: 5px; }
        .loc-card p { font-size: 0.85rem; color: #666; }
        .loc-card i { color: #17AFEF; margin-right: 5px; }
    </style>
</head>
<body>

    <div id="navbar"></div>

    <main class="main-content">
        <div class="map-container-box">
            <h1>Our Service Centers</h1>
            <p style="color: #666;">Find a PetWatch clinic near you. We are open 24/7.</p>

            <div id="sl-map"></div>

            <div class="location-grid">
              
            </div>

            <div style="margin-top: 30px;">
                <a href="services.html" class="btn-submit" style="text-decoration: none; padding: 12px 30px;">
                    Book an Appointment Now
                </a>
            </div>
        </div>
    </main>

    <div id="footer"></div>
<script src="../../Frontend/javascript/locations.js"></script>
    <script src="../../Frontend/javascript/navbar.js"></script>
    <script src="../../Frontend/javascript/footer.js"></script>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>

    <script>
        // 1. Initialize Map centered on Sri Lanka
        // Coordinates for Sri Lanka center: 7.8731° N, 80.7718° E
        var map = L.map('sl-map').setView([7.6, 80.65], 8); // Zoom level 8 shows whole island

        // 2. Add OpenStreetMap Tile Layer
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

   
        async function loadLocations() {

    try {

        const response = await fetch("http://localhost:5001/api/locations");
        const locations = await response.json();

        const grid = document.querySelector(".location-grid");
        grid.innerHTML = "";

        locations.forEach(loc => {

            // Add marker to map
            L.marker([loc.lat, loc.lng])
                .addTo(map)
                .bindPopup(`<b>${loc.name}</b><br>${loc.address}<br>${loc.phone || ""}`);

            // Create card
            const card = document.createElement("div");
            card.className = "loc-card";

            card.innerHTML = `
                <h3><i class="fa-solid fa-location-dot"></i> ${loc.city}</h3>
                <p>${loc.name}<br>${loc.address}</p>
            `;

            // Click zoom
            card.addEventListener("click", function () {
                focusMap(loc.lat, loc.lng);
            });

            grid.appendChild(card);

        });

    } catch (err) {
        console.error("Error loading locations:", err);
    }
}
        loadLocations();

        // 4. Add Markers to Map
        locations.forEach(loc => {
            L.marker([loc.lat, loc.lng])
                .addTo(map)
                .bindPopup(`<b>${loc.name}</b><br>${loc.info}`);
        });

        // 5. Function to zoom when clicking cards
        function focusMap(lat, lng) {
            map.flyTo([lat, lng], 13, {
                animate: true,
                duration: 1.5
            });
        }
    </script>

</body>
</html>
