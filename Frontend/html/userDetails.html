<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Details - PetWatch</title>
    
    <link rel="stylesheet" href="../../Frontend/css/services.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="../../Frontend/css/navbar.css">
    
</head>
<body>

    <div id="navbar"></div>

    <main class="main-content">
        <div class="card-container">
            <h1>Your Details</h1>
            <p style="text-align: center; color: #666; margin-bottom: 30px;">
                Please provide your contact information to finalize the booking.
            </p>

            <div class="form-box">
                <form class="form-grid" id="userDetailsForm">
                    
                    <div class="row">
                        <div class="input-group">
                            <label>Full Name</label>
                            <div class="input-wrapper">
                                <input type="text" id="userName" placeholder="Enter Your Full Name">
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="input-group">
                            <label>Phone Number</label>
                            <div class="input-wrapper">
                                <input type="tel" id="userPhone" placeholder="07X XXX XXXX">
                                <i class="fa-solid fa-phone icon-right"></i>
                            </div>
                        </div>
                        <div class="input-group">
                            <label>Email Address</label>
                            <div class="input-wrapper">
                                <input type="email" id="userEmail" placeholder="example@email.com">
                                <i class="fa-solid fa-envelope icon-right"></i>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="input-group">
                            <label>Address</label>
                            <div class="input-wrapper">
                                <input type="text" id="userAddress" placeholder="Your Home Address">
                                <i class="fa-solid fa-location-dot icon-right"></i>
                            </div>
                        </div>
                    </div>

                </form>
            </div>

            <div class="btn-container">
                <button class="btn-submit" id="confirmBookingBtn">Confirm Booking</button>
            </div>

        </div> 
    </main>
  
    <footer>
        <div id="footer"></div>
    </footer>
  
    <script src="../../Frontend/javascript/navbar.js"></script>
    <script src="../../Frontend/javascript/footer.js"></script>

    <script>
    // 1. Get Booking ID from URL
    const urlParams = new URLSearchParams(window.location.search);
    const bookingId = urlParams.get('bookingId');

    if (!bookingId) {
        alert("Error: No booking ID found. Please start over.");
        window.location.href = "services.html";
    }

    document.getElementById('confirmBookingBtn').addEventListener('click', function(e) {
        e.preventDefault();

        const userData = {
            userName: document.getElementById('userName').value,
            userPhone: document.getElementById('userPhone').value,
            userEmail: document.getElementById('userEmail').value,
            userAddress: document.getElementById('userAddress').value
        };

        if(!userData.userName || !userData.userPhone) {
            alert("Please fill in at least Name and Phone.");
            return;
        }

        // 2. Send PUT Request to update the booking
        fetch(`http://127.0.0.1:5001/api/book/${bookingId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(userData)
        })
        .then(res => res.json())
        .then(data => {
            if(data.message === 'Step 2 Complete') {
                // 3. Redirect to the FINAL Confirmation Page
                window.location.href = `confirmation.html?bookingId=${bookingId}`;
            } else {
                alert("Error saving details.");
            }
        })
        .catch(err => console.error(err));
    });
</script>

</body>
</html>
