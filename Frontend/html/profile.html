<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - PetWatch</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../Frontend/css/navbar.css">
    <link rel="stylesheet" href="../../Frontend/css/profile.css">
    <style>
        /* Additional styles for multiple pets */
        .pet-card {
            border: 1px solid #eee;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
            background-color: #f9f9f9;
        }
        
        .pet-card .pet-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .pet-card .pet-header h3 {
            margin: 0;
            color: #333;
            font-size: 18px;
        }
        
        .pet-actions {
            display: flex;
            gap: 10px;
        }
        
        .pet-actions button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            padding: 5px;
            border-radius: 5px;
            transition: all 0.3s;
        }
        
        .edit-pet-btn {
            color: #17AFEF;
        }
        
        .edit-pet-btn:hover {
            background-color: rgba(23, 175, 239, 0.1);
        }
        
        .delete-pet-btn {
            color: #ff4444;
        }
        
        .delete-pet-btn:hover {
            background-color: rgba(255, 68, 68, 0.1);
        }
        
        .save-pet-btn {
            color: #27ae60;
        }
        
        .save-pet-btn:hover {
            background-color: rgba(39, 174, 96, 0.1);
        }
        
        .cancel-pet-btn {
            color: #888;
        }
        
        .cancel-pet-btn:hover {
            background-color: rgba(136, 136, 136, 0.1);
        }
        
        .pet-form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .add-pet-container {
            margin-top: 20px;
            text-align: center;
        }
        
        #addNewPetBtn {
            background-color: #17AFEF;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: background-color 0.3s;
        }
        
        #addNewPetBtn:hover {
            background-color: #0d9bd6;
        }
        
        .delete-confirmation {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .delete-confirmation.hidden {
            display: none;
        }
        
        .delete-confirmation .modal {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 400px;
            text-align: center;
        }
        
        .delete-confirmation .modal h3 {
            margin-bottom: 15px;
            color: #333;
        }
        
        .delete-confirmation .modal p {
            margin-bottom: 25px;
            color: #666;
        }
        
        .delete-confirmation .modal .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        
        .delete-confirmation .modal button {
            padding: 10px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .delete-confirmation .modal .confirm-delete {
            background-color: #ff4444;
            color: white;
        }
        
        .delete-confirmation .modal .confirm-delete:hover {
            background-color: #cc0000;
        }
        
        .delete-confirmation .modal .cancel-delete {
            background-color: #eee;
            color: #333;
        }
        
        .delete-confirmation .modal .cancel-delete:hover {
            background-color: #ddd;
        }
        
        .message {
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }
        
        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        
        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
    </style>
</head>
<body>

    <div id="navbar"></div>

    <main class="main-content">
        <div class="profile-header">
            <h1>My Profile</h1>
            <a href="myAppointments.html" class="my-appointments-btn">My Appointments</a>
        </div>

        <div id="messageContainer" class="message"></div>

        <div class="profile-card">
            <div class="profile-left">
                <div class="profile-image-container">
                    <img src="../../Resources/profileImg.png" alt="User with Pets">
                </div>
            </div>

            <div class="profile-right">
                <div class="section-header">
                    <h2>My Details</h2>
                    <a href="#" class="edit-details-link" id="editDetailsBtn">
                        <i class="fa-regular fa-pen-to-square"></i> Edit My Details
                    </a>
                </div>
                <div class="form-grid" id="userDetailsForm">
                    <div class="form-group">
                        <label for="userName">User Name</label>
                        <input type="text" id="userName" class="form-control" placeholder="Emma Roberts" readonly>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" class="form-control" placeholder="Emma213@gmail.com" readonly>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" class="form-control" placeholder="********" readonly>
                    </div>
                    <div class="form-group mobile-group">
                        <label for="mobile">Mobile</label>
                        <input type="tel" id="mobile" class="form-control" placeholder="**********" readonly>
                    </div>
                </div>

                <div class="section-header">
                    <h2>My Pets</h2>
                </div>
                
                <div id="petsContainer">
                    <!-- Pet cards will be dynamically added here -->
                    <div class="loading">Loading your pets...</div>
                </div>

                <div class="add-pet-container">
                    <button id="addNewPetBtn">
                        <i class="fa-solid fa-plus"></i> Add New Pet
                    </button>
                </div>

                <div class="actions-container">
                    <button class="logout-btn" id="logoutBtn">
                        <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
                    </button>
                    <button class="save-btn" id="saveDetailsBtn" style="display: none;">Save Details</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="delete-confirmation hidden">
        <div class="modal">
            <h3>Delete Pet</h3>
            <p>Are you sure you want to delete this pet? This action cannot be undone.</p>
            <div class="buttons">
                <button class="cancel-delete" id="cancelDelete">Cancel</button>
                <button class="confirm-delete" id="confirmDelete">Delete</button>
            </div>
        </div>
    </div>

    <div id="footer"></div>

    <script src="../../Frontend/javascript/navbar.js"></script>
    <script src="../../Frontend/javascript/footer.js"></script>
    <script src="../../Frontend/javascript/profile.js"></script>
</body>
</html>
