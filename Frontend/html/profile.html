<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - PetWatch</title>
    <link rel="stylesheet" href="../../Frontend/css/navbar.css">
    <link rel="stylesheet" href="../../Frontend/css/services.css"> <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Page Specific Styles */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fbfdfe; /* Match the light background from other pages */
            margin: 0;
            padding: 0;
        }

        .main-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 140px 20px 60px; /* Padding to clear navbar */
        }

        .profile-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .profile-header h1 {
            font-size: 32px;
            font-weight: 700;
            color: #333;
            margin: 0;
        }

        .my-appointments-btn {
            background-color: #17AFEF;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.3s;
        }

        .my-appointments-btn:hover {
            background-color: #0d9bd6;
        }

        .profile-card {
            background-color: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            display: flex;
            gap: 60px;
        }

        .profile-left {
            flex: 0 0 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .profile-image-container {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .profile-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .add-new-pet-btn {
            background-color: white;
            color: #17AFEF;
            border: 1px solid #17AFEF;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background-color 0.3s, color 0.3s;
        }

        .add-new-pet-btn:hover {
            background-color: #17AFEF;
            color: white;
        }

        .profile-right {
            flex: 1;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .section-header h2 {
            font-size: 24px;
            font-weight: 700;
            color: #333;
            margin: 0;
        }

        .edit-details-link {
            color: #17AFEF;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .edit-details-link i {
            font-size: 14px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 40px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 16px;
            font-weight: 500;
            color: #555;
            margin-bottom: 10px;
        }

        .form-control {
            padding: 15px 20px;
            border: 1px solid #eee;
            border-radius: 12px;
            font-size: 16px;
            color: #333;
            background-color: #f9f9f9;
            outline: none;
            font-family: 'Inter', sans-serif;
        }

        .form-control:focus {
            border-color: #17AFEF;
            background-color: white;
        }

        /* Custom arrow for select */
        select.form-control {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%23555' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M6 9l6 6 6-6'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 20px center;
            padding-right: 40px;
        }

        .breed-group {
            grid-column: span 2; /* Breed spans full width */
        }

        .actions-container {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 30px;
            margin-top: 40px;
        }

        .logout-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #888;
            text-decoration: none;
            font-size: 18px;
            font-weight: 600;
            background: none;
            border: none;
            cursor: pointer;
        }

        .save-btn {
            background-color: #17AFEF;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .save-btn:hover {
            background-color: #0d9bd6;
        }

        /* Responsive Design */
        @media (max-width: 992px) {
            .profile-card {
                flex-direction: column;
                padding: 30px;
            }
            .profile-left {
                flex: 0 0 auto;
                margin-bottom: 40px;
                width: 100%;
            }
            .breed-group {
                grid-column: span 1;
            }
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .profile-header {
                flex-direction: column;
                gap: 20px;
                align-items: flex-start;
            }
            .actions-container {
                flex-direction: column-reverse;
                gap: 20px;
                align-items: stretch;
            }
            .logout-btn {
                justify-content: center;
            }
            .save-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div id="navbar"></div>

    <main class="main-content">
        <div class="profile-header">
            <h1>My Profile</h1>
            <a href="#" class="my-appointments-btn">My Appointments</a>
        </div>

        <div class="profile-card">
            <div class="profile-left">
                <div class="profile-image-container">
                    <img src="../../Resources/user-with-pets-3d.png" alt="User with Pets">
                </div>
                <a href="#" class="add-new-pet-btn">
                    <i class="fa-solid fa-plus"></i> Add New Pet
                </a>
            </div>

            <div class="profile-right">
                
                <div class="section-header">
                    <h2>My Details</h2>
                    <a href="#" class="edit-details-link">
                        <i class="fa-regular fa-pen-to-square"></i> Edit My Details
                    </a>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="userName">User Name</label>
                        <input type="text" id="userName" class="form-control" placeholder="Emma Roberts">
                    </div>
                    <div class="form-group">
                        <label for="address">Address</label>
                        <input type="text" id="address" class="form-control" placeholder="Kandy, Sri Lanka">
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" class="form-control" placeholder="Emma213@gmail.com">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" class="form-control" placeholder="*********">
                    </div>
                    <div class="form-group" style="grid-column: span 2;">
                        <label for="mobile">Mobile</label>
                        <input type="tel" id="mobile" class="form-control" placeholder="**********">
                    </div>
                </div>

                <div class="section-header">
                    <h2>Pet Details</h2>
                    <a href="#" class="edit-details-link">
                        <i class="fa-regular fa-pen-to-square"></i> Edit Pet Details
                    </a>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="petName">Pet Name</label>
                        <input type="text" id="petName" class="form-control" placeholder="Kitty">
                    </div>
                    <div class="form-group">
                        <label for="age">Age</label>
                        <select id="age" class="form-control">
                            <option value="3 years">3 years</option>
                            <option value="1 year">1 year</option>
                            <option value="2 years">2 years</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="petType">Pet Type</label>
                        <input type="text" id="petType" class="form-control" placeholder="Cat">
                    </div>
                    <div class="form-group">
                        <label for="weight">Weight</label>
                        <select id="weight" class="form-control">
                            <option value="5 Kg">5 Kg</option>
                            <option value="1 Kg">1 Kg</option>
                            <option value="3 Kg">3 Kg</option>
                        </select>
                    </div>
                    <div class="form-group breed-group">
                        <label for="breed">Breed</label>
                        <select id="breed" class="form-control">
                            <option value="Persian">Persian</option>
                            <option value="Siamese">Siamese</option>
                        </select>
                    </div>
                </div>

                <div class="actions-container">
                    <button class="logout-btn">
                        <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
                    </button>
                    <button class="save-btn">Save</button>
                </div>

            </div>
        </div>
    </main>

    <div id="footer"></div>

    <script src="../../Frontend/javascript/navbar.js"></script>
    <script src="../../Frontend/javascript/footer.js"></script>
</body>
</html>
