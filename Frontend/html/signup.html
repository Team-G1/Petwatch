<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up Now</title>
    <link rel="stylesheet" href="../../Frontend/css/signup.css">
    <link rel="stylesheet" href="../../Frontend/css/footer.css"/>

</head>
<body>
    
    <div id="navbar"></div>
    
    <div class="card_body">
        <div class="container">

            <div class="signup_left_section">
                <h2>Welcome to PetWatch</h2>
                <p>Taking care of your pet has never been easier. <span class="Signup_sub_txt">Sign Up Now</span> to book appointments.</p>
                <img src="../../Resources/Sg_image.png" alt="dog and cat">
            </div>

            <form id="signupForm">
                <div class="input_field">
                    <input type="text" placeholder="Username" name="name" required>
                </div>
                <div class="input_field">
                    <input type="email" placeholder="Email" name="email" required>
                </div>
                <div class="input_field">
                    <input type="tel" placeholder="Mobile" name="mobile" required>
                </div>
                <div class="input_field">
                    <input type="password" placeholder="Password" name="password" required>
                </div>
                <div class="input_field">
                    <input type="password" placeholder="Confirm password" name="confirmPassword" required>
                </div>
                <button class="signup_btn" type="submit">Sign Up</button>
            </form>
            <div id="messageDisplay" class="validation_error"></div>
    
    
    
    
      
      
          <script src="../../Frontend/javascript/navbar.js"></script>
          <script src="../../Frontend/javascript/footer.js"></script>
</body>
</html>
