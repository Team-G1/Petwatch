<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmed</title>
    <link rel="stylesheet" href="../../Frontend/css/services.css">
    
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
    
    <style>
        .main-content {
            display: flex; justify-content: center; align-items: center; min-height: 80vh; padding: 20px;
        }
        .confirmation-box {
            background: white; padding: 40px; border-radius: 16px;
            max-width: 600px; width: 100%; text-align: center;
            box-shadow: 0 4px 25px rgba(0,0,0,0.1);
        }
        .success-icon { color: #2ecc71; font-size: 50px; margin-bottom: 20px; }
        
        .appt-number {
            background: #f0f9ff; color: #17AFEF; padding: 15px 30px;
            border-radius: 12px; font-size: 1.8rem; font-weight: 800;
            display: inline-block; margin: 20px 0; border: 2px dashed #17AFEF;
        }

        .details-grid {
            text-align: left; background: #f9f9f9; padding: 25px;
            border-radius: 12px; margin: 20px 0; font-size: 1rem; line-height: 1.6;
        }
        .details-grid p { margin: 8px 0; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        .details-grid strong { color: #555; width: 100px; display: inline-block; }

        /* QR Section */
        .qr-container {
            display: flex; flex-direction: column; align-items: center; 
            margin-top: 30px; padding-top: 20px; border-top: 2px solid #eee;
        }
        /* We use a CANVAS element now, which is more reliable */
        #qr-canvas {
            margin: 15px; 
            border: 1px solid #ddd; 
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <main class="main-content">
        <div class="confirmation-box">
            <div class="success-icon"><i class="fa-solid fa-circle-check"></i></div>
            <h1>Booking Confirmed!</h1>
            <p>Your appointment has been successfully scheduled.</p>

            <div id="apptNumDisplay" class="appt-number">Loading...</div>

            <div class="details-grid" id="detailsList">
                <p><strong>Owner:</strong> <span id="dispName">...</span></p>
                <p><strong>Pet:</strong> <span id="dispPet">...</span></p>
                <p><strong>Service:</strong> <span id="dispService">...</span></p>
                <p><strong>Date:</strong> <span id="dispDate">...</span></p>
                <p><strong>Location:</strong> <span id="dispLoc">...</span></p>
            </div>

            <div class="qr-container">
                <h3>Your Entry Pass</h3>
                
                <canvas id="qr-canvas"></canvas>
                
                <br>
                <button class="btn-submit" onclick="downloadQR()" style="padding: 10px 30px;">
                    <i class="fa-solid fa-download"></i> Download QR
                </button>
            </div>

            <div style="margin-top: 20px;">
                <a href="home.html" style="color: #666; text-decoration: none;">Return to Home</a>
            </div>
        </div>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const bookingId = urlParams.get('bookingId');

        // A. Fetch Data from Backend
        fetch(`http://127.0.0.1:5001/api/book/${bookingId}`)
            .then(res => res.json())
            .then(data => {
                // Fill Text
                document.getElementById('apptNumDisplay').innerText = data.appointmentNumber || "#PENDING";
                document.getElementById('dispName').innerText = data.userName || "N/A";
                document.getElementById('dispPet').innerText = (data.petName || "") + " (" + (data.petType || "") + ")";
                document.getElementById('dispService').innerText = data.serviceType || "General";
                document.getElementById('dispDate').innerText = data.date || (data.dateFrom + " to " + data.dateTo);
                document.getElementById('dispLoc').innerText = data.location || "Main Clinic";

                // B. Generate REAL QR Code (Using Modern Library)
                const qrContent = `
=== PETWATCH PASS ===
Appt ID: ${data.appointmentNumber}
Owner: ${data.userName}
Pet: ${data.petName}
Service: ${data.serviceType}
Date: ${data.date || data.dateFrom}
Location: ${data.location}
=====================`.trim();

                const canvas = document.getElementById('qr-canvas');

                // This command draws the QR code onto the canvas
                QRCode.toCanvas(canvas, qrContent, { 
                    width: 200,
                    margin: 2,
                    color: {
                        dark: "#000000",
                        light: "#ffffff"
                    }
                }, function (error) {
                    if (error) console.error("QR Error:", error);
                    else console.log('QR Code generated successfully!');
                });
            })
            .catch(err => {
                console.error(err);
                document.querySelector('.confirmation-box').innerHTML = "<h2>Error loading details.</h2>";
            });

        // C. Download Logic (Updated for Canvas)
        function downloadQR() {
            const canvas = document.getElementById("qr-canvas");
            
            if(canvas) {
                // Convert the canvas drawing to an image URL
                const imageURL = canvas.toDataURL("image/png");
                
                // Create a temporary link to download it
                const link = document.createElement("a");
                link.href = imageURL;
                link.download = "PetWatch_Entry_Pass.png";
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } else {
                alert("QR Code is not ready yet.");
            }
        }
    </script>
</body>
</html>
