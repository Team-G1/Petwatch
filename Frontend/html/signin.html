<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - PetWatch</title>
    
    <link rel="stylesheet" href="../../Frontend/css/navbar.css">
    <link rel="stylesheet" href="../../Frontend/css/services.css">
    <link rel="stylesheet" href="../../Frontend/css/signin.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div id="navbar"></div>

    <main class="signin-main">
        <div class="signin-container">
            
            <div class="signin-card">
                <div class="signin-left">
                    <div class="left-text">
                        <h2>Welcome Back!</h2>
                        <p>Please <a href="#">Sign In</a> to your account to continue..</p>
                    </div>
                    
                    <div class="left-graphics">
                        <div class="blue-blob"></div>
                        <img src="../../Resources/Login_pg.png" alt="PetWatch Pets Running" class="pets-img">
                    </div>
                </div>

                <div class="signin-right">
                    <h2 class="form-title">Sign In</h2>
                    
                    <form class="signin-form">
                        <div class="input-group">
                            <i class="fa-solid fa-user"></i>
                            <input type="text" placeholder="Username or Email" required>
                        </div>
                        
                        <div class="input-group">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" placeholder="Password" required>
                            <i class="fa-solid fa-eye-slash toggle-pwd"></i>
                        </div>
                        
                        <button type="submit" class="btn-signin">Sign In</button>
                    </form>

                    <div class="extra-links">
                        <a href="#" class="forgot-pwd">Forgot your password?</a>
                        <div class="signup-link">
                            Don't have an account? <a href="/html/signup.html">Sign Up</a>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <div id="footer"></div>

    <!-- Load modules in correct order -->
    <script src="../../Frontend/javascript/navbar.js"></script>
    <script src="../../Frontend/javascript/footer.js"></script>
    <script src="../../Frontend/javascript/signin.js"></script>
</body>
</html>
