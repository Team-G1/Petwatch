<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - PetWatch</title>
    
    <link rel="stylesheet" href="../../Frontend/css/navbar.css">
    <link rel="stylesheet" href="../../Frontend/css/services.css"> 
    <link rel="stylesheet" href="../../Frontend/css/resetPassword.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div id="navbar"></div>

    <main class="ResetPassword-main">
        <div class="ResetPassword-container">
            
            <div class="ResetPassword-card">
                <div class="ResetPassword-left">
                    <div class="left-text">
                        <h2>Secure Your Account</h2>
                        <p>Verify your mobile number to receive a secure reset code in your <strong>registered email</strong>.</p>
                    </div>
                    
                    <div class="left-graphics">
                        <div class="blue-blob"></div>
                        <img src="../../Resources/resetPasswordImage.png" alt="PetWatch Pets Running" class="pets-img">
                    </div>
                </div>

                <div class="ResetPassword-right">
                    <h2 class="form-title">Reset Password</h2>
                    
                    <form class="ResetPassword-form">
                        <div class="input-group">
                            <i class="fa-solid fa-mobile-screen"></i>
                            <input type="text" id="mobileInput" placeholder="Registered Mobile" required>
                        </div>
                        
                        <div class="input-group">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="newPassword" placeholder="New Password" required>
                            <i class="fa-solid fa-eye-slash toggle-pwd"></i>
                        </div>
                        
                        <div class="input-group">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="confirmPassword" placeholder="Confirm New Password" required>
                            <i class="fa-solid fa-eye-slash toggle-pwd"></i>
                        </div>

                        <button type="submit" class="btn-ResetPassword">Get Reset Code</button>
                    </form>

                    <div class="extra-links">
                        <a href="signin.html" class="forgot-pwd">Back to Login</a>
                        <div class="ResetPassword-link">
                            New to PetWatch? <a href="signup.html">Join Us</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="otpModal" class="otp-modal-overlay" style="display: none;">
        <div class="otp-modal-card">
            <i class="fa-solid fa-envelope-open-text otp-icon" style="color: #17AFEF; font-size: 3rem; margin-bottom: 15px;"></i>
            <h3>Check Your Email</h3>
            <p>We've sent a 6-digit verification code to the email associated with <span id="targetMobile" style="font-weight: 700;"></span></p>
            
            <div class="otp-input-wrapper">
                <input type="text" maxlength="6" id="otpCode" placeholder="000000" autocomplete="one-time-code">
            </div>
            
            <button id="verifyOtpBtn" class="btn-ResetPassword">Verify & Update</button>
            <button id="closeOtpBtn" class="btn-cancel" style="background:none; border:none; color:#888; cursor:pointer; margin-top:10px;">Cancel</button>
        </div>
    </div>

    <div id="footer"></div>

    <script src="../../Frontend/javascript/resetPassword.js"></script>
    <script src="../../Frontend/javascript/navbar.js"></script>
    <script src="../../Frontend/javascript/footer.js"></script>
</body>
</html>
