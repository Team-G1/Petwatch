<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - PetWatch</title>
    
    <link rel="stylesheet" href="../../Frontend/css/navbar.css">
    <link rel="stylesheet" href="../../Frontend/css/services.css"> <link rel="stylesheet" href="../../Frontend/css/resetPassword.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div id="navbar"></div>

    <main class="ResetPassword-main">
        <div class="ResetPassword-container">
            
            <div class="ResetPassword-card">
                <div class="ResetPassword-left">
                    <div class="left-text">
                        <h2>Welcome Back!</h2>
                        <p>Enter your email  and new password to receive a link to  <a href="#">Reset</a> your PetWatch password.</p>
                    </div>
                    
                    <div class="left-graphics">
                        <div class="blue-blob"></div>
                        <img src="../../Resources/resetPasswordImage.png" alt="PetWatch Pets Running" class="pets-img">
                    </div>
                </div>

                <div class="ResetPassword-right">
                    <h2 class="form-title">ResetPassword</h2>
                    
                    <form action="#" class="ResetPassword-form">
                        <div class="input-group">
                            <i class="fa-solid fa-mobile-screen"></i>
                            <input type="text" placeholder="Mobile" required>
                        </div>
                        
                        <div class="input-group">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" placeholder="Password" required>
                            <i class="fa-solid fa-eye-slash toggle-pwd"></i>
                        </div>
                        
                        <div class="input-group">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" placeholder="Confirm password" required>
                            <i class="fa-solid fa-eye-slash toggle-pwd"></i>
                        </div>

                        <button type="submit" class="btn-ResetPassword">Reset Password</button>
                    </form>

                    <div class="extra-links">
                        <a href="#" class="forgot-pwd">Remember your password?</a>
                        <div class="ResetPassword-link">
                            Already have an account ? <a href="#">Sign In</a>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <div id="footer"></div>

    <script src="../../Frontend/javascript/navbar.js"></script>
    <script src="../../Frontend/javascript/footer.js"></script>
</body>
</html>
